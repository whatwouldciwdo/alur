version: '3.8'

services:
  db:
    image: postgres:15
    container_name: alur_postgres
    environment:
      POSTGRES_USER: alur_user
      POSTGRES_PASSWORD: alur_password
      POSTGRES_DB: alur_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
